name: CI

# PR과 main 푸시마다 타입체크·빌드를 자동 검증한다.
# 깨진 코드(타입 오류·빌드 실패)가 main에 머지·배포되는 것을 막는 안전망.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
